version: '3.9'

services:
  redis:
    image: redis:7.4-alpine
    container_name: wa-chat-redis
    ports:
      - '127.0.0.1:6379:6379'
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    container_name: wa-chat-otel-collector
    profiles:
      - otel
    command: ['--config=/etc/otel-collector-config.yml']
    volumes:
      - ./docker/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'

volumes:
  redis-data:
